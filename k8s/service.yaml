# ClusterIP que espera be_docker en ea2-haproxy-academic (prefijo /backend en HAProxy compartido).
apiVersion: v1
kind: Service
metadata:
  name: demo-api
  labels:
    app: demo-api
spec:
  type: ClusterIP
  selector:
    app: demo-api
  ports:
    - name: http
      port: 3000
      targetPort: http
